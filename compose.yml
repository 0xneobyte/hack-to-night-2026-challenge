# use with docker compose up --build --watch

services:
  htn26-challenge-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: htn-26-challenge-dev-container
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: bun.lock
