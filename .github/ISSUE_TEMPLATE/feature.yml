name: ✨ Feature request
description: Suggest a new feature or enhancement
labels: ['feature']
body:
  - type: dropdown
    id: phase
    attributes:
      label: Phase
      description: Which phase should this feature land in?
      options:
        - Phase 3 — New features
        - Future / unscheduled
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend / API
        - Database / Supabase
        - DevOps / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Who is affected?
      placeholder: 'When I try to ... I cannot ...'
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen instead?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider and reject?

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / references
      description: Sketches, screenshots, or links to similar features in other apps.
